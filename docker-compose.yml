services:
  postgres:
    image: postgres:15
    container_name: user-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: user-redis
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    container_name: user-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
  app:
    build: .
    container_name: user-service-app
    restart: always
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: user_service
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  pgdata:
